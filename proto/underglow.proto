syntax = "proto3";

// bridge.underglow ["Request"]

package bridge.underglow;

enum RGB_cmd {
    RGB_TOG = 0;
    RGB_ON = 1;
    RGB_OFF = 2;
    RGB_HUI = 3;
    RGB_HUD = 4;
    RGB_SAI = 5;
    RGB_SAD = 6;
    RGB_BRI = 7;
    RGB_BRD = 8;
    RGB_SPI = 9;
    RGB_SPD = 10;
    RGB_EFF = 11;
    RGB_EFR = 12;
    RGB_EFS = 13;
    RGB_COLOR_HSB = 14;
}

message Request {
    oneof request_type {
        RGB_cmd set_ug_cmd = 1;
    }
}
